<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Naya — Your Strategic Intelligence</title>
    <!-- Anti-flash : applique le thème avant le premier paint -->
    <script>
      (function() {
        var saved = localStorage.getItem('naya-theme');
        var theme = (saved === 'light' || saved === 'dark') ? saved : 'dark';
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>

    <!-- Naya Typography: Unbounded (display/titres) + Inter (corps fallback) -->
    <!-- Unbounded = alternative gratuite à Anantason Ultra Expanded (Google Fonts, open source) -->
    <!-- Si Anantason est acheté plus tard : ajouter @font-face dans index.css + retirer Unbounded -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
